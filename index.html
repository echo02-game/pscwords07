<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>普通話水平測試 - 難點字詞練習詞卡</title>
    <style>
        /* CSS 變量與全局設定 */
        :root {
            --color-light: #91C6BC;
            --color-main: #4B9DA9;
            --color-bg: #FFFFFF;
            --color-accent: #E37434;
            --font-yuanti: "Yuanti SC", "YouYuan", "STYuanti", "Microsoft YaHei", sans-serif;
            --font-pinyin: "Calibri", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-yuanti);
            background-color: var(--color-bg);
            color: #333;
            min-height: 100vh;
            min-height: 100svh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            
            -webkit-user-select: none;
            user-select: none; 
        }

        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* 頂部標題與計數器 */
        header {
            padding: env(safe-area-inset-top, 15px) 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            z-index: 10;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .title-line1 {
            color: #666666;
            font-size: clamp(0.8rem, 3vw, 1rem);
            font-weight: normal;
        }

        .title-line2 {
            color: #000000;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            font-weight: bold;
            word-wrap: break-word;
        }

        .title-hint {
            color: #888888;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: normal;
            margin-top: 2px;
        }

        .counter {
            color: var(--color-main);
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
            white-space: nowrap;
            margin-left: 10px;
        }

        /* 視圖切換管理 */
        .view {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 20px 20px 20px;
        }

        .view.active {
            display: flex;
        }

        /* 登入視圖 */
        #login-view {
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        #login-view h2 {
            color: #000000;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .project-info {
            text-align: center;
            margin-bottom: 10px;
        }

        .project-info h3 {
            color: var(--color-main);
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid var(--color-light);
            border-radius: 10px;
            font-family: var(--font-yuanti);
            outline: none;
        }

        input:focus {
            border-color: var(--color-main);
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: var(--font-yuanti);
            background-color: var(--color-main);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--color-accent);
            font-size: 1rem;
            min-height: 1.5em;
        }

        /* 詞卡視圖 */
        #card-view {
            justify-content: flex-start;
        }

        .card-container {
            perspective: 1000px;
            width: 85vw;
            max-width: 500px;
            aspect-ratio: 4/3;
            margin: 5vh auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-radius: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white;
            border-radius: 20px;
            border: 4px solid var(--color-light);
            padding: 20px;
        }

        .card-back {
            transform: rotateY(180deg);
            border-color: var(--color-main);
        }

        .hanzi {
            font-size: clamp(40px, 11vw, 75px);
            color: #333;
            font-weight: bold;
        }

        .pinyin {
            font-family: var(--font-pinyin);
            font-size: clamp(22px, 6vw, 36px);
            color: var(--color-accent);
            margin-bottom: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 85vw;
            max-width: 500px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .controls button {
            flex: 1;
            padding: 12px 0;
            font-size: clamp(1rem, 4vw, 1.2rem);
        }

        /* 結算視圖 */
        #finish-view {
            overflow-y: auto;
            justify-content: flex-start;
            padding-bottom: 80px;
        }

        #finish-view h2 {
            color: #4B9DA9;
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .finish-controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .finish-controls button {
            flex: 1;
            padding: 12px 0;
            font-size: clamp(1rem, 4vw, 1.2rem);
        }

        #restart-btn {
            background-color: #91C6BC;
        }

        #restart-btn:hover {
            background-color: var(--color-main);
        }

        #home-btn {
            background-color: var(--color-accent);
        }

        #home-btn:hover {
            opacity: 0.9;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .word-item {
            background-color: white;
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid var(--color-light);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        /* 結算頁面：點擊播放時的變色效果 */
        .word-item.playing {
            background-color: var(--color-light);
            border-color: var(--color-main);
        }

        .word-item.playing .hanzi, 
        .word-item.playing .pinyin {
            color: white;
        }

        .word-item .pinyin {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .word-item .hanzi {
            font-size: 1.2rem;
        }

        /* 底部版權宣告 */
        footer {
            width: 100%;
            padding: 15px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
            font-size: 0.7rem;
            color: #999;
            text-align: center;
            background-color: var(--color-bg);
            margin-top: auto;
        }

        /* 開發者模式 */
        #dev-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            opacity: 0.3;
            cursor: pointer;
            display: none;
            z-index: 100;
        }

        #dev-panel {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            z-index: 99;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #dev-panel textarea {
            width: 300px;
            height: 200px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header id="main-header" style="display: none;">
        <div class="title-container">
            <h2 class="title-line1">普通話水平測試</h2>
            <h1 class="title-line2">【作品7號】難點字詞練習詞卡</h1>
            <p class="title-hint">點擊詞卡播放示範錄音</p>
        </div>
        <div class="counter" id="counter">1/22</div>
    </header>

    <div id="login-view" class="view active">
        <h2>開始練習</h2>
        <!-- 新增：顯示作品號數及名稱 -->
        <div class="project-info">
            <p style="color: #666; font-size: 1rem;">普通話水平測試</p>
            <h3>【作品7號】難點字詞練習詞卡</h3>
        </div>
        <div class="input-group">
            <input type="text" id="username" placeholder="請輸入姓名">
            <input type="password" id="password" placeholder="請輸入密碼">
        </div>
        <div class="error-msg" id="login-error"></div>
        <button id="login-btn">進入</button>
    </div>

    <div id="card-view" class="view">
        <div id="dev-toggle">🛠️</div>
        
        <div id="dev-panel">
            <p><strong>時間軸標記工具</strong></p>
            <button id="dev-start-btn" style="padding: 5px 10px; font-size: 0.9rem; margin: 10px 0;">開始錄製模式</button>
            <button id="dev-mark-btn" style="padding: 5px 10px; font-size: 0.9rem; background: var(--color-accent); margin: 10px 0;" disabled>標記下一句 (或按空白鍵)</button>
            <p id="dev-status">等待開始...</p>
            <textarea id="dev-output" readonly></textarea>
        </div>

        <div class="card-container">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="hanzi" id="front-hanzi"></div>
                </div>
                <div class="card-face card-back">
                    <div class="pinyin" id="back-pinyin"></div>
                    <div class="hanzi" id="back-hanzi"></div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="prev-btn">上一個</button>
            <button id="next-btn">下一個</button>
        </div>
    </div>

    <div id="finish-view" class="view">
        <h2>恭喜完成練習，讀得真不錯！</h2>
        <!-- 新增：回主目錄按鈕 -->
        <div class="finish-controls">
            <button id="restart-btn">再來一遍</button>
            <button id="home-btn">回主目錄</button>
        </div>
        <div class="word-list" id="word-list"></div>
    </div>

    <footer>
        本網頁拼音均由AI生成，標準注音請參考《普通話水平測試實施綱要（2021年版）》。<br>
        錄音僅供參考。網頁僅供機構内部使用。普通話培訓測試中心版權所有。
    </footer>

    <!-- 更新了對應的音檔路徑 -->
    <audio id="audio-player" src="pscwords07.mp3" preload="auto"></audio>

    <script>
        // === 數據定義 (替換為作品7號的字詞，時間軸為開發測試的臨時預設值，請使用 🛠️ 工具重新標記) ===
        let sentenceData = [
    { "word": "高速列車", "pinyin": "gāo sù liè chē", "start": 0, "end": 2 },
    { "word": "呼嘯而過", "pinyin": "hū xiào ér guò", "start": 2, "end": 4 },
    { "word": "轉瞬即逝", "pinyin": "zhuǎn shùn jí shì", "start": 4, "end": 6 },
    { "word": "不得不", "pinyin": "bù dé bù", "start": 6, "end": 8 },
    { "word": "那麽", "pinyin": "nà me", "start": 8, "end": 10 },
    { "word": "司機", "pinyin": "sī jī", "start": 10, "end": 12 },
    { "word": "時速", "pinyin": "shí sù", "start": 12, "end": 14 },
    { "word": "能見度", "pinyin": "néng jiàn dù", "start": 14, "end": 16 },
    { "word": "霧霾", "pinyin": "wù mái", "start": 16, "end": 18 },
    { "word": "識別", "pinyin": "shí bié", "start": 18, "end": 20 },
    { "word": "肉眼", "pinyin": "ròu yǎn", "start": 20, "end": 22 },
    { "word": "障礙", "pinyin": "zhàng ài", "start": 22, "end": 24 },
    { "word": "來不及", "pinyin": "lái bu jí", "start": 24, "end": 26 },
    { "word": "設置", "pinyin": "shè zhì", "start": 26, "end": 28 },
    { "word": "信號", "pinyin": "xìn hào", "start": 28, "end": 30 },
    { "word": "列控系統", "pinyin": "liè kòng xì tǒng", "start": 30, "end": 32 },
    { "word": "實現", "pinyin": "shí xiàn", "start": 32, "end": 34 },
    { "word": "傳輸", "pinyin": "chuán shū", "start": 34, "end": 36 },
    { "word": "計算機", "pinyin": "jì suàn jī", "start": 36, "end": 38 },
    { "word": "間隔", "pinyin": "jiàn gé", "start": 38, "end": 40 },
    { "word": "追蹤", "pinyin": "zhuī zōng", "start": 40, "end": 42 },
    { "word": "確保", "pinyin": "què bǎo", "start": 42, "end": 44 },
    { "word": "仍然", "pinyin": "réng rán", "start": 44, "end": 46 },
    { "word": "軌道", "pinyin": "guǐ dào", "start": 46, "end": 48 },
    { "word": "傳説", "pinyin": "chuán shuō", "start": 48, "end": 50 },
    { "word": "現實", "pinyin": "xiàn shí", "start": 50, "end": 52 },
    { "word": "沿綫", "pinyin": "yán xiàn", "start": 52, "end": 54 },
    { "word": "攝像頭", "pinyin": "shè xiàng tóu", "start": 54, "end": 56 },
    { "word": "石子兒", "pinyin": "shí zǐr", "start": 56, "end": 58 }
];

        // === 狀態變量 ===
        let currentIndex = 0;
        let isFlipped = false;
        let audioPlayer = document.getElementById('audio-player');
        let playTimeout;
        let activeWordElement = null;

        // === DOM 元素 ===
        const loginView = document.getElementById('login-view');
        const cardView = document.getElementById('card-view');
        const finishView = document.getElementById('finish-view');
        const mainHeader = document.getElementById('main-header');
        
        const loginBtn = document.getElementById('login-btn');
        const passwordInput = document.getElementById('password');
        const usernameInput = document.getElementById('username');
        const loginError = document.getElementById('login-error');
        
        const flashcard = document.getElementById('flashcard');
        const frontHanzi = document.getElementById('front-hanzi');
        const backHanzi = document.getElementById('back-hanzi');
        const backPinyin = document.getElementById('back-pinyin');
        const counter = document.getElementById('counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const homeBtn = document.getElementById('home-btn'); // 新增的按鈕變數
        const wordList = document.getElementById('word-list');

        // === 登入邏輯 ===
        function attemptLogin() {
            const inputVal = passwordInput.value.trim().toLowerCase();
            if (inputVal === 'vtcpsc') {
                if (usernameInput.value.trim() === '') {
                    loginError.textContent = '請輸入姓名';
                    return;
                }
                loginError.textContent = '';
                loginView.classList.remove('active');
                cardView.classList.add('active');
                mainHeader.style.display = 'flex';
                updateCard();
            } else {
                loginError.textContent = '請輸入正確密碼';
            }
        }

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });

        // === 詞卡邏輯 ===
        function updateCard() {
            flashcard.style.transition = 'none';
            flashcard.classList.remove('is-flipped');
            isFlipped = false;
            
            void flashcard.offsetWidth;
            
            flashcard.style.transition = 'transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1)';

            const data = sentenceData[currentIndex];
            frontHanzi.textContent = data.word;
            backHanzi.textContent = data.word;
            backPinyin.textContent = data.pinyin;
            counter.textContent = `${currentIndex + 1}/${sentenceData.length}`;
            
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? '0.5' : '1';
        }

        function playAudioSnippet(start, end, onEndCallback = null) {
            clearTimeout(playTimeout);
            audioPlayer.currentTime = start;
            audioPlayer.play().catch(e => console.log("等待用戶交互以播放音頻", e));
            
            const duration = (end - start) * 1000;
            playTimeout = setTimeout(() => {
                audioPlayer.pause();
                if (onEndCallback) onEndCallback();
            }, duration);
        }

        flashcard.addEventListener('click', () => {
            isFlipped = true;
            flashcard.classList.add('is-flipped');
            const data = sentenceData[currentIndex];
            playAudioSnippet(data.start, data.end);
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < sentenceData.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                showFinishView();
            }
        });

        // === 結算視圖邏輯 ===
        function showFinishView() {
            cardView.classList.remove('active');
            finishView.classList.add('active');
            mainHeader.style.display = 'none';
            
            wordList.innerHTML = '';
            sentenceData.forEach((item) => {
                const el = document.createElement('div');
                el.className = 'word-item';
                el.innerHTML = `<div class="pinyin">${item.pinyin}</div><div class="hanzi">${item.word}</div>`;
                
                el.addEventListener('click', () => {
                    if (activeWordElement) {
                        activeWordElement.classList.remove('playing');
                    }
                    
                    el.classList.add('playing');
                    activeWordElement = el;
                    
                    playAudioSnippet(item.start, item.end, () => {
                        el.classList.remove('playing');
                        activeWordElement = null;
                    });
                });
                
                wordList.appendChild(el);
            });
        }

        restartBtn.addEventListener('click', () => {
            currentIndex = 0;
            finishView.classList.remove('active');
            cardView.classList.add('active');
            mainHeader.style.display = 'flex';
            updateCard();
        });

        // 新增：回主目錄按鈕事件
        homeBtn.addEventListener('click', () => {
            window.location.href = 'https://echo02-game.github.io/pscwordshub/';
        });

        // === 開發者模式邏輯 ===
        const devToggle = document.getElementById('dev-toggle');
        const devPanel = document.getElementById('dev-panel');
        const devStartBtn = document.getElementById('dev-start-btn');
        const devMarkBtn = document.getElementById('dev-mark-btn');
        const devStatus = document.getElementById('dev-status');
        const devOutput = document.getElementById('dev-output');
        
        let isDevMode = false;
        let isRecording = false;
        let devData = [];
        let currentRecordIndex = 0;
        let lastMarkTime = 0;

        if (navigator.userAgent.indexOf("Win") !== -1 || navigator.userAgent.indexOf("Mac") !== -1) {
            devToggle.style.display = 'block';
        }

        devToggle.addEventListener('click', () => {
            isDevMode = !isDevMode;
            devPanel.style.display = isDevMode ? 'block' : 'none';
        });

        devStartBtn.addEventListener('click', () => {
            isRecording = true;
            devData = JSON.parse(JSON.stringify(sentenceData));
            currentRecordIndex = 0;
            lastMarkTime = 0;
            devOutput.value = '';
            devMarkBtn.disabled = false;
            
            currentIndex = 0;
            updateCard();
            
            devStatus.textContent = `錄製中: 第 ${currentRecordIndex + 1} 個詞 (${devData[currentRecordIndex].word})`;
            
            clearTimeout(playTimeout);
            audioPlayer.currentTime = 0;
            audioPlayer.play();
        });

        function markTime() {
            if (!isRecording) return;
            
            const currentTime = audioPlayer.currentTime;
            devData[currentRecordIndex].start = lastMarkTime;
            devData[currentRecordIndex].end = currentTime;
            lastMarkTime = currentTime;
            
            currentRecordIndex++;
            
            if (currentRecordIndex < devData.length) {
                devStatus.textContent = `錄製中: 第 ${currentRecordIndex + 1} 個詞 (${devData[currentRecordIndex].word})`;
                currentIndex = currentRecordIndex;
                updateCard();
            } else {
                audioPlayer.pause();
                isRecording = false;
                devMarkBtn.disabled = true;
                devStatus.textContent = "錄製完成！";
                devOutput.value = "let sentenceData = " + JSON.stringify(devData, null, 4) + ";";
            }
        }

        devMarkBtn.addEventListener('click', markTime);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                markTime();
            }
        });
    </script>
</body>
</html>
